<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary Search</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/index.css">
    <script src="/static/index.js" defer></script>
</head>

<body>
    <!-- Floating Search Helper -->
    <button id="search-helper" class="search-button search-helper-btn" type="button"
        onclick="executeSearch()">Search</button>

    <div class="search-container">



        <form class="search-form" action="/" method="GET">
            <!-- History Button -->
            <button type="button" id="history-btn" class="history-button" title="Search History"
                onclick="toggleHistory()">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z" />
                </svg>
            </button>

            <div class="search-input-wrapper">
                <input type="text" id="word-input" name="word" class="search-input"
                    placeholder="Type a word or phrase..." required autocomplete="off">
                <!-- Autocomplete Dropdown -->
                <div id="autocomplete-dropdown" class="autocomplete-dropdown"></div>
                <!-- History Dropdown -->
                <div id="history-dropdown" class="history-dropdown">
                    <ul class="history-list">
                        {% for item in history %}
                        <li class="history-item">
                            <a href="/?word={{ item }}">
                                {{ item }}
                            </a>
                        </li>
                        {% endfor %}
                        {% if not history %}
                        <li class="history-item" style="padding: 10px; color: #999; text-align: center;">No history yet
                        </li>
                        {% endif %}
                    </ul>
                </div>
            </div>
            <button type="submit" class="search-button">Search</button>
        </form>

        <!-- Right Controls (Auto-Play + Help) -->
        <div class="right-controls">
            <button type="button" id="audio-toggle-btn" class="audio-button" onclick="toggleAutoPlay()"
                title="Toggle Auto-Play">
                <!-- Icon will be set by JS -->
            </button>

            <button type="button" class="history-button" title="Hotkeys & Help" onclick="toggleHelpModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </button>
        </div>
    </div>



    <div class="container">
        <!-- Longman -->
        <div class="dict-panel">
            <div class="dict-header">
                <span>Longman</span>
                <a href="#" id="longman-link" class="external-link" target="_blank" title="Open in original site">
                    Original
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                </a>
            </div>
            <iframe id="longman"></iframe>
        </div>

        <!-- Cambridge -->
        <div class="dict-panel">
            <div class="dict-header">
                <span>Cambridge</span>
                <a href="#" id="cambridge-link" class="external-link" target="_blank" title="Open in original site">
                    Original
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                </a>
            </div>
            <iframe id="cambridge"></iframe>
        </div>

        <!-- Oxford -->
        <div class="dict-panel">
            <div class="dict-header">
                <span>Oxford</span>
                <a href="#" id="oxford-link" class="external-link" target="_blank" title="Open in original site">
                    Original
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                </a>
            </div>
            <iframe id="oxford"></iframe>
        </div>
    </div>


    <!-- Help Modal -->
    <div id="help-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Keyboard Shortcuts</span>
                <button class="close-modal" onclick="closeHelpModal()">&times;</button>
            </div>

            <div class="key-row">
                <span>Focus Search</span>
                <span class="kbd">/</span>
            </div>
            <div class="key-row">
                <span>Play Audio</span>
                <span class="kbd">Space</span>
            </div>

            <div class="key-row">
                <span>Toggle History</span>
                <span class="kbd">h</span>
            </div>
            <div class="key-row">
                <span>Close Popup / Unfocus</span>
                <span class="kbd">Esc</span>
            </div>
        </div>
    </div>
</body>

</html>

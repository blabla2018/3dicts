<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if word %}Dictionary Search: {{ word }}{% else %}Dictionary Search{% endif %}</title>
    <meta name="theme-color" content="#0b6bdb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Dictionary Search">
    <link rel="manifest" href="/static/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/index.css">
    <script>
        window.APP_VERSION = {{ app_version|tojson }};
        window.HELP_URL = "/help";
    </script>
    <script src="/static/index.js" defer></script>
</head>

<body>
    <button id="search-helper" class="search-helper-btn" type="button" onclick="executeSearch()" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
        </svg>
    </button>

    <button id="mobile-search-fab" class="mobile-search-fab" type="button" aria-label="Open search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
        </svg>
    </button>

    <div class="search-container">
        <form class="search-form" action="/" method="GET">
            <input type="hidden" id="dict-input" name="dict" value="">
            <div class="search-input-wrapper">
                <span class="search-input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
                    </svg>
                </span>
                <input type="text" id="word-input" name="word" class="search-input"
                    placeholder="Type a word or phrase..." required autocomplete="off">
                <button type="button" id="search-clear-btn" class="search-clear-btn" aria-label="Clear search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div id="autocomplete-dropdown" class="autocomplete-dropdown"></div>
        </form>

        <div class="right-controls">
            <button type="button" id="audio-toggle-btn" class="audio-button" onclick="toggleAutoPlay()"
                title="Toggle Auto-Play"></button>
        </div>
    </div>
    <div class="container">
        <div class="dict-panel">
            <div class="dict-header">
                <span class="dict-title-group">
                    <span>Longman</span>
                    <span class="mobile-dict-indicator">1/3</span>
                </span>
                <a href="#" id="longman-link" class="external-link" target="_blank" title="Open in original site">
                    Original
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                </a>
            </div>
            <iframe id="longman"></iframe>
        </div>

        <div class="dict-panel">
            <div class="dict-header">
                <span class="dict-title-group">
                    <span>Cambridge</span>
                    <span class="mobile-dict-indicator">2/3</span>
                </span>
                <a href="#" id="cambridge-link" class="external-link" target="_blank" title="Open in original site">
                    Original
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                </a>
            </div>
            <iframe id="cambridge"></iframe>
        </div>

        <div class="dict-panel">
            <div class="dict-header">
                <span class="dict-title-group">
                    <span>Oxford</span>
                    <span class="mobile-dict-indicator">3/3</span>
                </span>
                <a href="#" id="oxford-link" class="external-link" target="_blank" title="Open in original site">
                    Original
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                </a>
            </div>
            <iframe id="oxford"></iframe>
        </div>
    </div>

</body>

</html>

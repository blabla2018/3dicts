<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3dicts Settings</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/info-pages.css">
</head>

<body>
    <div class="page">
        <div class="header">
            <h1>Settings</h1>
            <button type="button" class="back-link" onclick="history.back()">Back</button>
        </div>
        <div class="content">
            <div class="section-title">Pronunciation</div>
            <div class="card">
                <div class="row">
                    <div>
                        <div class="label">Auto-play on card open</div>
                        <div class="hint">Play pronunciation automatically when a dictionary card opens.</div>
                    </div>
                    <button type="button" id="autoplay-toggle" class="switch" aria-label="Toggle auto-play"></button>
                </div>
            </div>

            <div class="settings-section">
                <div class="section-title">Reading</div>
            <div class="card">
                <div class="row">
                    <div>
                        <div class="label">Text size</div>
                        <div class="hint">Adjust the dictionary text size on this device.</div>
                    </div>
                    <div class="scale-control">
                        <button type="button" id="font-minus" class="icon-btn" aria-label="Decrease text size">−</button>
                        <div id="font-scale-value" class="value">100%</div>
                        <button type="button" id="font-plus" class="icon-btn" aria-label="Increase text size">+</button>
                    </div>
                </div>
            </div>
            </div>

            <div class="footer-note">Version: {{ app_version }}</div>
        </div>
    </div>

    <script src="/static/settings.js"></script>
</body>

</html>
